<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 600" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="940" height="600" rx="16" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="939" height="599" rx="16" fill="none" stroke="#e2e8f0"/>

  <text x="32" y="44" font-size="22" font-weight="700" fill="#0f172a">PayBridge — Architecture</text>
  <text x="32" y="66" font-size="13" fill="#64748b">pnpm monorepo · TypeScript · Stripe-style payment gateway sandbox</text>

  <!-- Client column -->
  <g>
    <rect x="32" y="96" width="248" height="232" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="48" y="122" font-size="14" font-weight="700" fill="#0f172a">apps/web</text>
    <text x="48" y="140" font-size="11" fill="#64748b">Next.js 16 · shadcn · TanStack</text>

    <rect x="48" y="156" width="216" height="60" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
    <text x="60" y="180" font-size="13" font-weight="600" fill="#3730a3">Merchant dashboard</text>
    <text x="60" y="200" font-size="11" fill="#4f46e5">JWT session · keys · payments · webhooks · analytics</text>

    <rect x="48" y="228" width="216" height="56" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="60" y="251" font-size="13" font-weight="600" fill="#065f46">Hosted checkout</text>
    <text x="60" y="270" font-size="11" fill="#059669">Public · /checkout/:id</text>

    <text x="48" y="312" font-size="11" fill="#94a3b8">TanStack Query · Table · RHF + Zod</text>
  </g>

  <!-- API column -->
  <g>
    <rect x="346" y="96" width="270" height="380" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="362" y="122" font-size="14" font-weight="700" fill="#0f172a">apps/api</text>
    <text x="362" y="140" font-size="11" fill="#64748b">Express · Zod · pino · error middleware</text>

    <rect x="362" y="156" width="238" height="44" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="374" y="176" font-size="12" font-weight="600" fill="#0f172a">/auth</text>
    <text x="374" y="192" font-size="10.5" fill="#64748b">register · login → JWT (bcrypt)</text>

    <rect x="362" y="208" width="238" height="44" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="374" y="228" font-size="12" font-weight="600" fill="#3730a3">/dashboard/*</text>
    <text x="374" y="244" font-size="10.5" fill="#64748b">JWT · keys · payments · webhooks · analytics</text>

    <rect x="362" y="260" width="238" height="44" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="374" y="280" font-size="12" font-weight="600" fill="#9a3412">/v1/*</text>
    <text x="374" y="296" font-size="10.5" fill="#64748b">API key (sk_test) · per-key rate limit · idempotency</text>

    <rect x="362" y="312" width="238" height="44" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="374" y="332" font-size="12" font-weight="600" fill="#065f46">/checkout/*</text>
    <text x="374" y="348" font-size="10.5" fill="#64748b">public · payment state machine</text>

    <rect x="362" y="364" width="238" height="40" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="374" y="389" font-size="12" font-weight="600" fill="#0f172a">/docs · /openapi.json</text>

    <rect x="362" y="414" width="238" height="46" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="374" y="434" font-size="12" font-weight="600" fill="#9a3412">Webhook delivery</text>
    <text x="374" y="450" font-size="10.5" fill="#b45309">HMAC-SHA256 signed · retry w/ backoff</text>
  </g>

  <!-- Data + external -->
  <g>
    <rect x="682" y="96" width="226" height="96" rx="12" fill="#f0f9ff" stroke="#bae6fd"/>
    <text x="698" y="122" font-size="14" font-weight="700" fill="#075985">PostgreSQL</text>
    <text x="698" y="142" font-size="11" fill="#0369a1">packages/db · Prisma</text>
    <text x="698" y="162" font-size="10.5" fill="#0284c7">Merchant · ApiKey · Payment</text>
    <text x="698" y="178" font-size="10.5" fill="#0284c7">WebhookEndpoint · WebhookDelivery</text>

    <rect x="682" y="414" width="226" height="62" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="698" y="438" font-size="13" font-weight="700" fill="#9a3412">Merchant endpoint</text>
    <text x="698" y="457" font-size="10.5" fill="#b45309">verifies PayBridge-Signature</text>
  </g>

  <!-- Shared package strip -->
  <g>
    <rect x="32" y="512" width="876" height="56" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="48" y="535" font-size="13" font-weight="700" fill="#0f172a">packages/shared</text>
    <text x="48" y="554" font-size="11" fill="#64748b">Zod schemas · API-key hashing · webhook signing (HMAC) · money/ID utils — reused by api, web &amp; seed</text>
  </g>

  <!-- Arrows -->
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#6366f1"/>
    </marker>
    <marker id="arrowG" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#16a34a"/>
    </marker>
    <marker id="arrowB" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <!-- dashboard -> API -->
  <line x1="280" y1="186" x2="346" y2="186" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="288" y="178" font-size="10" fill="#6366f1">HTTPS</text>

  <!-- checkout -> API -->
  <line x1="280" y1="256" x2="346" y2="320" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- API -> Postgres -->
  <line x1="616" y1="150" x2="682" y2="146" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrowB)"/>
  <text x="624" y="138" font-size="10" fill="#0284c7">Prisma</text>

  <!-- Webhook delivery -> Merchant endpoint -->
  <line x1="616" y1="440" x2="682" y2="443" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="620" y="432" font-size="10" fill="#16a34a">POST event</text>
</svg>
